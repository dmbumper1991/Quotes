<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quote</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Crimson+Text:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e0c;
      --surface: #1a1814;
      --gold: #c9a84c;
      --gold-dim: #7a6430;
      --text: #e8e0d0;
      --muted: #7a7060;
      --border: #2a2620;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Text', Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body {
      padding: 2rem;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.03) 0%, transparent 50%);
    }

    .card {
      max-width: 680px;
      width: 100%;
      position: relative;
      padding: 3rem 3.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--gold-dim);
      box-shadow:
        0 0 0 1px rgba(201,168,76,0.05),
        0 20px 60px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(201,168,76,0.08);
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.7s ease forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .ornament {
      display: block;
      text-align: center;
      color: var(--gold);
      font-size: 1.1rem;
      letter-spacing: 0.4em;
      margin-bottom: 2rem;
      opacity: 0.6;
    }

    .quote-mark {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 5rem;
      line-height: 0.6;
      color: var(--gold-dim);
      display: block;
      margin-bottom: 1.2rem;
      opacity: 0.5;
      user-select: none;
    }

    blockquote {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.35rem;
      font-weight: 400;
      font-style: italic;
      line-height: 1.65;
      color: var(--text);
      margin-bottom: 1.8rem;
      letter-spacing: 0.01em;
    }

    .attribution {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      color: var(--muted);
      font-size: 0.95rem;
      font-style: normal;
      letter-spacing: 0.03em;
    }

    .attribution::before {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: var(--gold-dim);
      flex-shrink: 0;
    }

    .attribution span {
      color: var(--gold);
      opacity: 0.85;
    }

    .refresh-btn {
      position: absolute;
      bottom: 1.5rem;
      right: 1.8rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Crimson Text', serif;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .refresh-btn:hover {
      color: var(--gold);
      border-color: var(--gold-dim);
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <span class="ornament">✦ &nbsp; ✦ &nbsp; ✦</span>
    <span class="quote-mark">"</span>
    <blockquote id="quote-text"></blockquote>
    <p class="attribution"><span id="quote-source"></span></p>
    <button class="refresh-btn" onclick="newQuote()">another →</button>
  </div>

  <script>
    const quotes = [
      { text: "Do good, die great.", source: "Jordan from VR Chat" },
      { text: "Do no harm, take no shit.", source: "Elizabeth Lesser" },
      { text: "Youth cannot know how age thinks and feels. But old men are guilty if they forget what it was to be young...", source: "Albus Dumbledore" },
      { text: "It is possible to commit no mistakes and still lose. That is not a weakness, that is life.", source: "Jean-Luc Picard" },
      { text: "When you do things right people won't be sure you've done anything at all.", source: "God — Futurama S03E20" },
      { text: "I want to know as many true things and as few false things as possible.", source: "Matt Dillahunty" },
      { text: "Today you, tomorrow me.", source: "r/rhoner" },
      { text: "It ain't what you don't know that gets you into trouble. It's what you know for sure that just ain't so.", source: "Mark Twain" },
      { text: "Sometimes life's a bitch, and then you keep on living.", source: "Diane Nguyen" },
      { text: "Writers don't like to write, they like having written.", source: "Dorothy Parker" },
      { text: "If you can't explain it simply, you don't understand it well enough.", source: "Albert Einstein" },
      { text: "Never attribute to malice that which is adequately explained by stupidity.", source: "Hanlon's Razor" },
      { text: "The map is not the territory.", source: "Alfred Korzybski" },
      { text: "Doubt is not a pleasant condition, but certainty is absurd.", source: "Voltaire" },
      { text: "Seek first to understand, then to be understood.", source: "Stephen Covey" },
      { text: "Never mistake a clear view for a short distance.", source: "Paul Saffo" },
    ];

    let lastIndex = -1;

    function newQuote() {
      let idx;
      do { idx = Math.floor(Math.random() * quotes.length); } while (idx === lastIndex);
      lastIndex = idx;

      const card = document.getElementById('card');
      card.style.animation = 'none';
      card.style.opacity = '0';
      card.style.transform = 'translateY(8px)';

      setTimeout(() => {
        document.getElementById('quote-text').textContent = quotes[idx].text;
        document.getElementById('quote-source').textContent = quotes[idx].source;
        card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
        card.style.opacity = '1';
        card.style.transform = 'translateY(0)';
      }, 150);
    }

    newQuote();
  </script>
</body>
</html>
